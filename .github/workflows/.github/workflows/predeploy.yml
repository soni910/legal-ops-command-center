name: Pre-deployment checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Compile existing Python paths
        run: |
          python - <<'PY'
          import compileall
          import pathlib
          import sys

          paths = [
              pathlib.Path("app.py"),
              pathlib.Path("pages"),
              pathlib.Path("utils"),
              pathlib.Path("scripts"),
              pathlib.Path("tests"),
          ]

          existing = [path for path in paths if path.exists()]

          if not existing:
              print("No app Python paths exist yet. Nothing to compile.")
              sys.exit(0)

          ok = True
          for path in existing:
              if path.is_file():
                  ok = compileall.compile_file(str(path), quiet=1) and ok
              else:
                  ok = compileall.compile_dir(str(path), quiet=1) and ok

          if not ok:
              raise SystemExit("Python compilation failed.")

          print("Python compilation passed.")
          PY

      - name: Run tests if test files exist
        run: |
          if find tests -name "test_*.py" -print -quit 2>/dev/null | grep -q .; then
            pytest -q
          else
            echo "No test files yet."
          fi
